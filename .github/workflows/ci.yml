name: CI

on:
  push:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: notifyhub_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
          --health-start-period=20s

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore NotifyHub.sln

      - name: Build
        run: dotnet build NotifyHub.sln --no-restore -c Release

      - name: Test
        run: dotnet test NotifyHub.sln --no-build -c Release --collect:"XPlat Code Coverage"
        env:
          ConnectionStrings__Default: "Server=127.0.0.1;Port=3306;Database=notifyhub_test;User=root;Password=root;"
          Jwt__Secret: "ci-test-secret-key-at-least-32-chars-long-0000"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: notifyhub-web/package-lock.json

      - name: Install web dependencies
        run: npm ci
        working-directory: notifyhub-web

      - name: Build web
        run: npm run build
        working-directory: notifyhub-web
